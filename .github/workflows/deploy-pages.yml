name: Deploy to GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ['Auto tag on version change']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Тег релиза, например v1.6.6'
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release source metadata
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "$EVENT_NAME" in
            workflow_dispatch)
              TAG="$INPUT_TAG"
              ;;
            push)
              TAG="$REF_NAME"
              ;;
            workflow_run)
              VERSION="$(node -p "require('./package.json').version")"
              TAG="v$VERSION"
              ;;
            *)
              echo "Неподдерживаемое событие: $EVENT_NAME"
              exit 1
              ;;
          esac

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Некорректный тег релиза: $RELEASE_TAG"
            exit 1
          fi

          git ls-remote --exit-code --tags \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "refs/tags/${RELEASE_TAG}" >/dev/null

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Read deployment revision
        id: revision
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build site
        run: pnpm build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_COMMIT_SHA: ${{ steps.revision.outputs.sha }}

      - name: Run production browser E2E
        run: pnpm test:e2e

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./dist

      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
