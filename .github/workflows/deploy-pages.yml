name: Redeploy GitHub Pages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Существующий тег релиза, например v1.8.0'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - name: Validate release tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Некорректный тег релиза: $RELEASE_TAG"
            exit 1
          fi

          git ls-remote --exit-code --tags \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "refs/tags/${RELEASE_TAG}" >/dev/null

      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release revision
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v$VERSION"
          HEAD_SHA="$(git rev-parse HEAD)"
          TAG_SHA="$(git rev-list -n 1 "$RELEASE_TAG")"

          if [[ "$RELEASE_TAG" != "$EXPECTED_TAG" ]]; then
            echo "Тег $RELEASE_TAG не соответствует версии package.json: $EXPECTED_TAG"
            exit 1
          fi
          if [[ "$TAG_SHA" != "$HEAD_SHA" ]]; then
            echo "Тег $RELEASE_TAG указывает на $TAG_SHA вместо checkout-ревизии $HEAD_SHA"
            exit 1
          fi

      - name: Read deployment revision
        id: revision
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Build site
        run: pnpm build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_COMMIT_SHA: ${{ steps.revision.outputs.sha }}

      - name: Verify PWA build
        run: pnpm test:pwa
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Run production browser E2E
        run: pnpm test:e2e
        env:
          E2E_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./dist

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
