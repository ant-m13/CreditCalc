name: Release built site

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Тег релиза, например v1.5.5'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Validate release tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Некорректный тег релиза: $RELEASE_TAG"
            exit 1
          fi
          git ls-remote --exit-code --tags \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "refs/tags/${RELEASE_TAG}" >/dev/null

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build site
        run: pnpm build
        env:
          VITE_BASE_PATH: ./

      - name: Run production browser E2E
        run: pnpm test:e2e

      - name: Pack dist
        run: |
          cd dist
          zip -r ../credit-calculator-dist.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: credit-calculator-dist.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
